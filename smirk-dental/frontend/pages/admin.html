<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Smirk Dental</title>
    <link rel="stylesheet" href="../css/style.css">

    <style>
        .admin-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 20px 30px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .admin-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
        }

        .appt-table {
            min-width: 820px;
        }

        .appt-row {
            display: grid;
            grid-template-columns: 1.3fr 1.1fr 0.95fr 0.85fr 0.95fr minmax(190px, auto);
            gap: 12px;
            padding: 14px 16px;
            align-items: center;
            font-size: 0.9rem;
        }

        .appt-row > div {
            min-width: 0;
            text-align: left;
        }

        .appt-row.header {
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .appt-row.data {
            border-bottom: 1px solid #f1f5f9;
            background: white;
        }

        .appt-row.data:hover {
            background: #fafbfc;
        }

        .appt-row.data:last-child {
            border-bottom: none;
        }

        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        .status-confirmed {
            background: #E6FFFA;
            color: #0F766E;
        }

        .status-cancelled {
            background: #FEF2F2;
            color: #B91C1C;
        }

        .status-completed {
            background: #EFF6FF;
            color: #1D4ED8;
        }

        .status-noshow {
            background: #FFF7ED;
            color: #C2410C;
        }

        .appt-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .appt-empty {
            padding: 30px;
            text-align: center;
            color: #64748b;
        }

        .admin-login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .admin-login-card {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 18px;
            padding: 36px 32px;
            box-shadow: 0 25px 60px rgba(15, 42, 56, 0.12);
            text-align: center;
        }

        .admin-login-card h2 {
            font-family: var(--font-display, Georgia, serif);
            font-size: 1.6rem;
            color: var(--navy, #0f2a38);
            margin-bottom: 1.5rem;
        }

        .admin-login-card .form-input {
            margin-bottom: 1rem;
        }

        .admin-login-card .remember-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0.55rem;
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .admin-login-card .remember-row input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            margin: 0;
            flex-shrink: 0;
            accent-color: var(--teal, #2aafaa);
            cursor: pointer;
        }

        .admin-login-card .remember-row label {
            font-size: 0.875rem;
            color: var(--grey, #666);
            line-height: 1.35;
            cursor: pointer;
        }

        .admin-login-card .btn-primary {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            justify-content: center;
        }

        .admin-stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 20px;
        }

        .appt-list-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .appt-list-inner {
            min-width: 820px;
        }

        .admin-filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        @media (max-width: 900px) {
            .admin-container {
                padding: 16px 14px;
                margin: 24px auto;
            }

            .admin-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .admin-header>div {
                flex-wrap: wrap;
            }

            .admin-stats-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body style="background:#f4f7fb;">

    <div id="loginScreen" class="admin-login-screen">
        <div class="admin-login-card">
            <h2>Admin Login</h2>
            <input type="password" id="adminPass" placeholder="Enter password" class="form-input">
            <div class="remember-row">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Stay logged in on this device</label>
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
        </div>
    </div>

    <div id="adminPanel" style="display:none">
        <div class="admin-container">
            <div class="admin-header">
                <h2>🦷 Appointments</h2>

                <div style="display:flex;gap:10px;align-items:center;">

                    <!-- 🔴 HOME BUTTON -->
                    <a href="../index.html" class="btn btn-sm btn-secondary">
                        Home
                    </a>

                    <button class="btn btn-sm btn-outline" onclick="openUnavailable()">Block Slots</button>

                    <!-- 🔴 LOGOUT BUTTON -->
                    <button class="btn btn-sm btn-primary" onclick="logout()">
                        Logout
                    </button>

                </div>
            </div>

            <div class="admin-stats-row">

                <div class="admin-card" style="padding:25px;">
                    <div style="font-size:0.8rem;color:gray;">Today</div>
                    <div id="statToday" style="font-size:1.8rem;font-weight:700;">0</div>
                </div>

                <div class="admin-card">
                    <div style="font-size:0.8rem;color:gray;">Total</div>
                    <div id="statTotal" style="font-size:1.8rem;font-weight:700;">0</div>
                </div>

                <div class="admin-card">
                    <div style="font-size:0.8rem;color:gray;">Cancelled</div>
                    <div id="statCancelled" style="font-size:1.8rem;font-weight:700;">0</div>
                </div>

            </div>

            <div class="admin-filter-row">
                <button class="btn btn-sm btn-primary" onclick="setActive(this);filterData('all')">All</button>
                <button class="btn btn-sm btn-secondary" onclick="setActive(this);filterData('today')">Today</button>
                <button class="btn btn-sm btn-secondary"
                    onclick="setActive(this);filterData('upcoming')">Upcoming</button>
            </div>

            <div class="admin-card appt-list-scroll">
                <div class="appt-list-inner appt-table">
                    <div class="appt-row header">
                        <div>Name</div>
                        <div>Phone</div>
                        <div>Date</div>
                        <div>Time</div>
                        <div>Status</div>
                        <div>Action</div>
                    </div>

                    <div id="appointmentsList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://smirk-clinic.onrender.com';
        const ADMIN_PASSWORD = "smirk123"; // 🔴 CHANGE THIS

        function login() {
            const pass = document.getElementById('adminPass').value;
            const remember = document.getElementById('rememberMe').checked;

            if (pass === ADMIN_PASSWORD) {

                if (remember) {
                    localStorage.setItem('adminAuth', 'true');
                    localStorage.setItem('adminPassword', pass);
                } else {
                    sessionStorage.setItem('adminAuth', 'true');
                    sessionStorage.setItem('adminPassword', pass);
                }

                showAdmin();

            } else {
                alert("Wrong password");
            }
        }

        function openUnavailable() {
            window.location.href = "appointment.html?adminBlock=true";
        }

        function logout() {
            localStorage.removeItem('adminAuth');
            localStorage.removeItem('adminPassword');
            sessionStorage.removeItem('adminAuth');
            sessionStorage.removeItem('adminPassword');

            window.location.href = "../index.html";
        }

        function getAdminPassword() {
            return localStorage.getItem('adminPassword') || sessionStorage.getItem('adminPassword') || '';
        }

        function showAdmin() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAppointments();
        }

        let ALL_APPOINTMENTS = [];

        async function loadAppointments() {
            const res = await fetch(`${API}/appointments/all`, {
                headers: { 'X-Admin-Password': getAdminPassword() }
            });
            if (res.status === 401) {
                localStorage.removeItem('adminAuth');
                localStorage.removeItem('adminPassword');
                sessionStorage.removeItem('adminAuth');
                sessionStorage.removeItem('adminPassword');
                location.reload();
                return;
            }
            const data = await res.json();

            ALL_APPOINTMENTS = data.appointments || [];

            updateStats(ALL_APPOINTMENTS);
            renderAppointments(ALL_APPOINTMENTS);
        }

        function updateStats(data) {
            const todayStr = new Date().toLocaleDateString('en-CA');

            const today = data.filter(a => a.date === todayStr && a.status === 'confirmed');
            const cancelled = data.filter(a => a.status === 'cancelled');
            const active = data.filter(a => a.status === 'confirmed');

            document.getElementById('statToday').textContent = today.length;
            document.getElementById('statTotal').textContent = active.length;
            document.getElementById('statCancelled').textContent = cancelled.length;
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }

        function statusBadge(status) {
            const s = String(status || 'confirmed').toLowerCase();
            const labels = {
                confirmed: 'Confirmed',
                cancelled: 'Cancelled',
                completed: 'Completed',
                'no-show': 'No show',
            };
            const cls = s === 'no-show' ? 'status-noshow' : `status-${s}`;
            return `<span class="status ${cls}">${esc(labels[s] || s)}</span>`;
        }

        function sortAppointments(list) {
            return [...list].sort((a, b) => {
                if (a.date !== b.date) return a.date.localeCompare(b.date);
                return String(a.time || '').localeCompare(String(b.time || ''));
            });
        }

        function renderAppointments(data) {
            const container = document.getElementById('appointmentsList');
            const rows = sortAppointments(data);

            if (!rows.length) {
                container.innerHTML = `
            <div class="appt-empty">
                <div style="font-size:2rem;margin-bottom:10px;">📭</div>
                <div>No appointments found</div>
            </div>
        `;
                return;
            }

            container.innerHTML = rows.map(a => {
                const id = esc(a._id);
                const actions = a.status === 'confirmed'
                    ? `<div class="appt-actions">
                <button class="btn btn-sm btn-secondary" onclick="reschedule('${id}')">Reschedule</button>
                <button class="btn btn-sm btn-primary" onclick="cancel('${id}')">Cancel</button>
               </div>`
                    : '<span style="color:#94a3b8;font-size:0.82rem">—</span>';

                return `
        <div class="appt-row data">
            <div><strong>${esc(a.name)}</strong></div>
            <div>${esc(a.phone)}</div>
            <div>${esc(a.date)}</div>
            <div>${esc(a.time)}</div>
            <div>${statusBadge(a.status)}</div>
            <div>${actions}</div>
        </div>`;
            }).join('');
        }

        function filterData(type) {
            const todayStr = new Date().toLocaleDateString('en-CA');

            let filtered = [];

            if (type === 'today') {
                filtered = ALL_APPOINTMENTS.filter(a => a.date === todayStr && a.status === 'confirmed');
            } else if (type === 'upcoming') {
                filtered = ALL_APPOINTMENTS.filter(a => a.date > todayStr && a.status === 'confirmed');
            } else {
                filtered = ALL_APPOINTMENTS;
            }

            renderAppointments(filtered);
        }

        function setActive(btn) {
            document.querySelectorAll('.admin-filter-row .btn-sm').forEach(b => {
                b.classList.remove('btn-primary');
                b.classList.add('btn-secondary');
            });

            btn.classList.remove('btn-secondary');
            btn.classList.add('btn-primary');
        }

        async function cancel(id) {
            if (!confirm('Cancel this appointment?')) return;

            const res = await fetch(`${API}/appointments/${id}/cancel`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Admin-Password': getAdminPassword()
                }
            });

            if (!res.ok) {
                alert('Could not cancel appointment.');
                return;
            }

            await loadAppointments();
        }

        async function reschedule(id) {
            const appt = ALL_APPOINTMENTS.find(a => a._id === id);
            if (!appt) return;

            localStorage.setItem('rescheduleId', id);
            localStorage.setItem('userAppointment', JSON.stringify({
                _id: id,
                name: appt.name,
                phone: appt.phone,
                date: appt.date,
                time: appt.time,
            }));

            window.location.href = 'appointment.html?reschedule=true';
        }

        if (
            localStorage.getItem('adminAuth') === 'true' ||
            sessionStorage.getItem('adminAuth') === 'true'
        ) {
            showAdmin();
        }
    </script>

</body>

</html>
